name: Build, Push, and Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: weconnect-production
  cancel-in-progress: false

env:
  IMAGE_NAME: weconnect
  DEPLOYMENT_NAME: weconnect-app
  CONTAINER_NAME: app
  K8S_NAMESPACE: default

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set image version
        id: vars
        shell: bash
        run: |
          short_sha="$(git rev-parse --short HEAD)"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "image_repo=${{ secrets.DOCKERHUB_USERNAME }}/weconnect" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.vars.outputs.image_repo }}:${{ steps.vars.outputs.short_sha }}
            ${{ steps.vars.outputs.image_repo }}:latest

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: tejas90@project-28225aef-d526-47fe-81e.iam.gserviceaccount.com

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Fetch GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER_NAME }}
          location: ${{ secrets.GKE_CLUSTER_LOCATION }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Roll out new image to GKE
        env:
          IMAGE_REPO: ${{ steps.vars.outputs.image_repo }}
          IMAGE_TAG: ${{ steps.vars.outputs.short_sha }}
        run: |
          kubectl -n "$K8S_NAMESPACE" set image deployment/"$DEPLOYMENT_NAME" "$CONTAINER_NAME"="$IMAGE_REPO:$IMAGE_TAG"
          kubectl -n "$K8S_NAMESPACE" rollout status deployment/"$DEPLOYMENT_NAME" --timeout=180s
