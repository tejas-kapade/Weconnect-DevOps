<!DOCTYPE html>
<html>
<head>
    <title>Admin Query Console</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="admin-console-page">

<div class="admin-console">
    <h1>Admin Query Console</h1>
    <textarea id="queryInput" class="admin-query-input" placeholder="Enter SQL query here..."></textarea>
    <div class="admin-console-actions">
        <button onclick="runQuery()" class="pools-primary-btn">Run Query</button>
    </div>
    <div id="queryOutput" class="admin-output-box">Query output will appear here.</div>
</div>

<div id="notification" class="notification hidden"></div>

<script src="js/admin.js"></script>

</body>
</html>
