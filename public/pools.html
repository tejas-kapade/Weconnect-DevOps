<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css/style.css">
    </head>
<body class="pools-page">
<!--<h2>Available Pools</h2>-->

<div class="top-bar">
    <div class="user-info">
        Welcome: <span id="username"></span>
    </div>

    <div class="top-actions">
        <button onclick="toggleCreatePanel()" class="pools-primary-btn">Create Pool</button>
        <button onclick="logout()" class="secondary-btn pools-neutral-btn">Logout</button>
    </div>
</div>

<!-- OLD STATIC POOLS CREATE PANEL
<div id="poolsContainer"></div>
<div class="container">
    <h3>Create Pool</h3>
    <input id="poolName" placeholder="Pool Name">
    <input id="poolPass" placeholder="Password">
    <button onclick="createPool()">Create</button>
</div>
-->

<!-- Hidden Create Panel -->
<div id="createModal" class="modal-overlay">
    <div class="modal-box">
        <h3>Create Pool</h3>
        <input id="poolName" placeholder="Pool Name">
        <input id="poolPass" placeholder="Password">

        <button onclick="createPool()" class="pools-primary-btn">Create</button>
        <button onclick="toggleCreatePanel()" class="secondary-btn pools-neutral-btn">Cancel</button>
    </div>
</div>

<!--Hidden Delete Confirmation Modal (instead of prompt we used panel) -->
<div id="deleteModal" class="modal-overlay">
    <div class="modal-box">
        <p id="deleteText"></p>

        <button onclick="confirmDelete()" class="danger-btn">Delete</button>
        <button onclick="closeDeleteModal()" class="secondary-btn pools-neutral-btn">Cancel</button>
    </div>
</div>

<!-- Notification -->
<div id="notification" class="notification hidden"></div>

<h2 class="section-title">Available Pools</h2>
<div id="poolsContainer"></div>

<footer class="app-footer">
    <span>Created by <a href="https://github.com/tejas-kapade/Weconnect-DevOps" target="_blank" rel="noopener noreferrer">tejas-kapade/Weconnect-DevOps</a></span>
    <span>weconnect version 1.2</span>
</footer>

<script src="js/pools.js"></script>
</body>

</html>
